<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>个人工具箱 - 6合1移动工具集</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入二维码生成库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <!-- 引入二维码扫描库 -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 头部标题 -->
        <header class="app-header">
            <h1>🔧 个人工具箱</h1>
            <p class="subtitle">6合1 · 随用随开</p>
        </header>

        <!-- 主要内容区域：显示当前选中的工具 -->
        <main class="tool-content" id="toolContent">
            <!-- 计算器（默认显示） -->
            <div id="calculator" class="tool-panel active">
                <div class="calculator-display">
                    <div class="history" id="calcHistory"></div>
                    <div class="current" id="calcCurrent">0</div>
                </div>
                <div class="calculator-buttons">
                    <button class="calc-btn func" data-action="clear">C</button>
                    <button class="calc-btn func" data-action="sign">±</button>
                    <button class="calc-btn func" data-action="percent">%</button>
                    <button class="calc-btn op" data-op="/">÷</button>
                    
                    <button class="calc-btn num" data-num="7">7</button>
                    <button class="calc-btn num" data-num="8">8</button>
                    <button class="calc-btn num" data-num="9">9</button>
                    <button class="calc-btn op" data-op="*">×</button>
                    
                    <button class="calc-btn num" data-num="4">4</button>
                    <button class="calc-btn num" data-num="5">5</button>
                    <button class="calc-btn num" data-num="6">6</button>
                    <button class="calc-btn op" data-op="-">−</button>
                    
                    <button class="calc-btn num" data-num="1">1</button>
                    <button class="calc-btn num" data-num="2">2</button>
                    <button class="calc-btn num" data-num="3">3</button>
                    <button class="calc-btn op" data-op="+">+</button>
                    
                    <button class="calc-btn num" data-num="0">0</button>
                    <button class="calc-btn num" data-num=".">.</button>
                    <button class="calc-btn func" data-action="back">⌫</button>
                    <button class="calc-btn op equal" data-action="equal">=</button>
                    
                    <button class="calc-btn sci" data-action="sqrt">√</button>
                    <button class="calc-btn sci" data-action="square">x²</button>
                    <button class="calc-btn sci" data-action="reciprocal">1/x</button>
                    <button class="calc-btn func" data-action="clear-entry">CE</button>
                </div>
            </div>

            <!-- 单位换算 -->
            <div id="unitConverter" class="tool-panel">
                <div class="unit-converter">
                    <div class="category-select">
                        <button class="category-btn active" data-category="length">长度</button>
                        <button class="category-btn" data-category="weight">重量</button>
                        <button class="category-btn" data-category="temperature">温度</button>
                        <button class="category-btn" data-category="area">面积</button>
                        <button class="category-btn" data-category="volume">体积</button>
                    </div>
                    
                    <div class="converter-inputs">
                        <div class="input-group">
                            <label id="unitFromLabel">千米 (km)</label>
                            <input type="number" id="fromValue" class="unit-input" placeholder="输入数值" value="1">
                        </div>
                        <div class="swap-btn" id="swapUnits">⇄</div>
                        <div class="input-group">
                            <label id="unitToLabel">米 (m)</label>
                            <input type="number" id="toValue" class="unit-input" placeholder="结果" readonly>
                        </div>
                    </div>
                    
                    <div class="unit-select">
                        <select id="fromUnit" class="unit-selector"></select>
                        <select id="toUnit" class="unit-selector"></select>
                    </div>
                    
                    <div class="common-values">
                        <p class="common-title">常用换算：</p>
                        <div class="common-buttons">
                            <button class="common-btn" data-value="1">1</button>
                            <button class="common-btn" data-value="10">10</button>
                            <button class="common-btn" data-value="100">100</button>
                            <button class="common-btn" data-value="1000">1000</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 汇率换算 -->
            <div id="exchangeRate" class="tool-panel">
                <div class="exchange-container">
                    <div class="rate-header">
                        <span class="rate-title">实时汇率</span>
                        <button class="refresh-btn" id="refreshRate">🔄 刷新</button>
                        <span class="rate-time" id="rateTime">--:--</span>
                    </div>
                    
                    <div class="exchange-inputs">
                        <div class="input-group">
                            <label>金额</label>
                            <input type="number" id="amountFrom" class="exchange-input" value="100">
                        </div>
                        <div class="input-group">
                            <label>从</label>
                            <select id="currencyFrom" class="currency-select">
                                <option value="CNY">人民币 CNY</option>
                                <option value="USD">美元 USD</option>
                                <option value="EUR">欧元 EUR</option>
                                <option value="GBP">英镑 GBP</option>
                                <option value="JPY">日元 JPY</option>
                                <option value="KRW">韩元 KRW</option>
                                <option value="AUD">澳元 AUD</option>
                                <option value="CAD">加元 CAD</option>
                                <option value="CHF">瑞士法郎 CHF</option>
                            </select>
                        </div>
                        <div class="swap-btn" id="swapCurrency">⇄</div>
                        <div class="input-group">
                            <label>到</label>
                            <select id="currencyTo" class="currency-select">
                                <option value="CNY">人民币 CNY</option>
                                <option value="USD" selected>美元 USD</option>
                                <option value="EUR">欧元 EUR</option>
                                <option value="GBP">英镑 GBP</option>
                                <option value="JPY">日元 JPY</option>
                                <option value="KRW">韩元 KRW</option>
                                <option value="AUD">澳元 AUD</option>
                                <option value="CAD">加元 CAD</option>
                                <option value="CHF">瑞士法郎 CHF</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="exchange-result">
                        <span id="exchangeRateValue" class="rate-value">1 CNY = ? USD</span>
                        <div class="converted-amount">
                            <span id="convertedAmount" class="amount-value">0.00</span>
                            <span id="toCurrencySymbol" class="amount-unit">USD</span>
                        </div>
                    </div>
                    
                    <div class="rate-note">
                        <small>💡 汇率数据每24小时更新一次，点击刷新获取最新</small>
                    </div>
                </div>
            </div>

            <!-- 二维码生成 -->
            <div id="qrGenerator" class="tool-panel">
                <div class="qr-container">
                    <div class="qr-input-group">
                        <label>输入文本或网址</label>
                        <input type="text" id="qrText" class="qr-text-input" placeholder="https:// 或 文本内容" value="https://gitee.com">
                        <button class="generate-btn" id="generateQR">生成二维码</button>
                    </div>
                    
                    <div class="qr-display" id="qrCodeDisplay">
                        <div id="qrcode"></div>
                    </div>
                    
                    <div class="qr-actions">
                        <button class="qr-action-btn" id="downloadQR">📥 保存图片</button>
                        <button class="qr-action-btn" id="shareQR">📤 分享</button>
                    </div>
                </div>
            </div>

            <!-- 二维码扫描 -->
            <div id="qrScanner" class="tool-panel">
                <div class="scanner-container">
                    <div class="scanner-controls">
                        <button class="scan-btn" id="startScan">📷 开始扫描</button>
                        <button class="scan-btn" id="stopScan">🛑 停止扫描</button>
                        <button class="scan-btn" id="scanFromFile">📁 从相册选择</button>
                    </div>
                    
                    <div class="scanner-view" id="scannerView">
                        <div id="qr-reader" style="width: 100%;"></div>
                        <div class="scanner-placeholder" id="scannerPlaceholder">
                            📱 点击"开始扫描"启用摄像头
                        </div>
                    </div>
                    
                    <div class="scan-result" id="scanResult">
                        <label>扫描结果：</label>
                        <div class="result-content">
                            <span id="scanResultText">暂无</span>
                            <button id="copyResultBtn" class="copy-btn">复制</button>
                        </div>
                        <a id="resultLink" href="#" style="display: none;">打开链接</a>
                        <button id="openResultBtn" class="copy-btn" style="display: none; margin-left: 8px; background: #4CAF50; font-size: 16px; padding: 10px 20px;">🔗 手动打开</button>
                        <p id="resultTip" style="display: none; margin-top: 8px; color: #e67e22; font-size: 14px;"></p>
                    </div>
                </div>
            </div>

            <!-- 待办清单 -->
            <div id="todoList" class="tool-panel">
                <div class="todo-container">
                    <div class="todo-stats">
                        <span>📋 总计：<span id="totalCount">0</span></span>
                        <span>✅ 已完成：<span id="completedCount">0</span></span>
                        <span>⏳ 未完成：<span id="uncompletedCount">0</span></span>
                    </div>
                    
                    <div class="todo-input-group">
                        <input type="text" id="todoInput" class="todo-input" placeholder="添加新任务..." @keyup.enter="addTodo">
                        <select id="prioritySelect" class="priority-select">
                            <option value="high">🔴 高优先级</option>
                            <option value="medium">🟡 中优先级</option>
                            <option value="low">🟢 低优先级</option>
                        </select>
                        <button class="add-todo-btn" id="addTodo">添加</button>
                    </div>
                    
                    <div class="todo-filters">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="active">未完成</button>
                        <button class="filter-btn" data-filter="completed">已完成</button>
                    </div>
                    
                    <ul class="todo-list" id="todoListContainer">
                        <li class="empty-tip">暂无任务，点击上方添加</li>
                    </ul>
                    
                    <button class="clear-completed" id="clearCompleted">清除已完成</button>
                </div>
            </div>
        </main>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-tool="calculator">
                <span class="nav-icon">🔢</span>
                <span class="nav-label">计算器</span>
            </div>
            <div class="nav-item" data-tool="unitConverter">
                <span class="nav-icon">📏</span>
                <span class="nav-label">单位换算</span>
            </div>
            <div class="nav-item" data-tool="exchangeRate">
                <span class="nav-icon">💱</span>
                <span class="nav-label">汇率</span>
            </div>
            <div class="nav-item" data-tool="qrGenerator">
                <span class="nav-icon">〓</span>
                <span class="nav-label">二维码</span>
            </div>
            <div class="nav-item" data-tool="qrScanner">
                <span class="nav-icon">📷</span>
                <span class="nav-label">扫一扫</span>
            </div>
            <div class="nav-item" data-tool="todoList">
                <span class="nav-icon">✅</span>
                <span class="nav-label">待办</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
